<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéDex Pro | Elite Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- Base Styles & Professional Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1a2e, #0f0f1a, #000000);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navigation & Search Styles --- */
        .top-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem 10%;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Glassmorphism Search Bar */
        .search-container {
            width: 100%;
            max-width: 600px;
        }

        .search-bar {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .search-bar::placeholder {
            color: #a0a0b5;
        }

        .search-bar:focus {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2), inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* Futuristic Filter Buttons */
        .filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #a0a0b5;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: #00ffcc;
            color: #000;
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        /* --- Header Styling --- */
        header {
            text-align: center;
            padding: 4rem 1rem 2rem;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .highlight {
            color: transparent;
            -webkit-text-stroke: 2px #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }

        header p {
            color: #a0a0b5;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* --- Grid Container --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            padding: 4rem 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- The "Crazy" Animated Cards --- */
        .card {
            position: relative;
            border-radius: 20px;
            padding: 1px;
            /* Creates the glowing border effect */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.05);
            z-index: 10;
        }

        /* Dynamic Glowing Drop Shadow */
        .card-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            background: var(--theme-color);
            opacity: 0;
            filter: blur(20px);
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .card:hover .card-glow {
            opacity: 0.5;
        }

        /* Professional Glassmorphism Content Box */
        .card-content {
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-align: center;
            height: 100%;
            position: relative;
        }

        /* 3D Pop-out Image Effect */
        .poke-img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            margin-top: -80px;
            /* Pulls the image out of the top of the card */
            margin-bottom: 1rem;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
            transition: transform 0.4s ease;
        }

        .card:hover .poke-img {
            transform: scale(1.15) rotate(3deg);
        }

        /* Typography & Info Styling */
        .poke-id {
            color: var(--theme-color);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .card-content h2 {
            font-size: 1.8rem;
            margin: 0.5rem 0 1rem;
            text-transform: capitalize;
        }

        /* Type Badges */
        .types {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .type {
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Stats Footer */
        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 12px;
        }

        .stat p {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.2rem;
        }

        .stat b {
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div class="search-container">
            <input type="text" placeholder="Search by name or ID..." class="search-bar">
        </div>
        <div class="filters">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Fire</button>
            <button class="filter-btn">Water</button>
            <button class="filter-btn">Electric</button>
            <button class="filter-btn">Ghost</button>
        </div>
    </nav>

    <header>
        <div class="header-content">
            <h1>PokéDex <span class="highlight">PRO</span></h1>
            <p>The ultimate database for elite trainers.</p>
        </div>
    </header>

    <main class="container">
        <article class="card" style="--theme-color: #ff5a00;">
            <div class="card-glow"></div>
            <div class="card-content">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png"
                    alt="Charizard" class="poke-img">
                <p class="poke-id">#006</p>
                <h2>Charizard</h2>
                <div class="types">
                    <span class="type" style="background: #FD7D24;">Fire</span>
                    <span class="type" style="background: #3DC7EF;">Flying</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <p>HP</p><b>78</b>
                    </div>
                    <div class="stat">
                        <p>ATK</p><b>84</b>
                    </div>
                    <div class="stat">
                        <p>DEF</p><b>78</b>
                    </div>
                </div>
            </div>
        </article>

        <article class="card" style="--theme-color: #8b00ff;">
            <div class="card-glow"></div>
            <div class="card-content">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png"
                    alt="Gengar" class="poke-img">
                <p class="poke-id">#094</p>
                <h2>Gengar</h2>
                <div class="types">
                    <span class="type" style="background: #B97FC9;">Ghost</span>
                    <span class="type" style="background: #A43E9E;">Poison</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <p>HP</p><b>60</b>
                    </div>
                    <div class="stat">
                        <p>ATK</p><b>65</b>
                    </div>
                    <div class="stat">
                        <p>DEF</p><b>60</b>
                    </div>
                </div>
            </div>
        </article>

        <article class="card" style="--theme-color: #ffcb05;">
            <div class="card-glow"></div>
            <div class="card-content">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
                    alt="Pikachu" class="poke-img">
                <p class="poke-id">#025</p>
                <h2>Pikachu</h2>
                <div class="types">
                    <span class="type" style="background: #EED535; color: #000;">Electric</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <p>HP</p><b>35</b>
                    </div>
                    <div class="stat">
                        <p>ATK</p><b>55</b>
                    </div>
                    <div class="stat">
                        <p>DEF</p><b>40</b>
                    </div>
                </div>
            </div>
        </article>

        <article class="card" style="--theme-color: #ff007f;">
            <div class="card-glow"></div>
            <div class="card-content">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png"
                    alt="Mewtwo" class="poke-img">
                <p class="poke-id">#150</p>
                <h2>Mewtwo</h2>
                <div class="types">
                    <span class="type" style="background: #F366B9;">Psychic</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <p>HP</p><b>106</b>
                    </div>
                    <div class="stat">
                        <p>ATK</p><b>110</b>
                    </div>
                    <div class="stat">
                        <p>DEF</p><b>90</b>
                    </div>
                </div>
            </div>
        </article>
    </main>

</body>

</html>
